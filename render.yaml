databases: []

services:
  # ── Web Dashboard + Trading Daemon (single service) ──────────────
  - type: web
    name: ot-corp
    runtime: python
    region: ohio
    plan: starter
    buildCommand: "pip install -r requirements.txt && cd dashboard && npm install && npm run build"
    startCommand: bash start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ── Runtime ──
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: TRADING_MODE
        value: paper
      - key: PORT
        value: "10000"

      # ── Alpaca (paper trading) ──
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"

      # ── AsterDex Perpetual Futures ──
      - key: ASTER_USER_ADDRESS
        sync: false
      - key: ASTER_SIGNER_ADDRESS
        sync: false
      - key: ASTER_PRIVATE_KEY
        sync: false
      - key: ASTER_API_KEY
        sync: false
      - key: ASTER_API_SECRET
        sync: false

      # ── Data Sources ──
      - key: FRED_API_KEY
        sync: false

      # ── Notifications (optional) ──
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      # ── Storage ──
      - key: DATA_DIR
        value: /data

      # ── Paper Trading ──
      - key: PAPER_BALANCE
        value: "1000"
      - key: INITIAL_CAPITAL
        value: "1000"

      # ── Tuning ──
      - key: LEVERAGE_PROFILE
        value: conservative
      - key: DAEMON_INTERVAL_HOURS
        value: "1"

    disk:
      name: agency-data
      mountPath: /data
      sizeGB: 1
