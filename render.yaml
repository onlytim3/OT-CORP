databases: []

services:
  # ── Web Dashboard + Trading Daemon (single service) ──────────────
  - type: web
    name: ot-corp
    runtime: python
    region: ohio
    plan: starter
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && cd dashboard && npm install && npm run build"
    startCommand: bash start.sh
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      # ── Runtime ──
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PYTHONIOENCODING
        value: "utf-8"
      - key: LANG
        value: "en_US.UTF-8"
      - key: LC_ALL
        value: "en_US.UTF-8"
      - key: TRADING_MODE
        value: paper
      - key: PORT
        value: "10000"

      # ── Security ──
      - key: DASHBOARD_PIN
        sync: false

      # ── Bybit Perpetual Futures (linear USDT) ──
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      # Testnet flag: "true" routes to api-testnet.bybit.com.
      # Flip to "false" at mainnet cutover.
      - key: BYBIT_TESTNET
        value: "true"
      - key: BYBIT_RECV_WINDOW
        value: "5000"

      # ── LLM (OpenAI GPT-4o-mini — primary reasoning) ──
      - key: OPENAI_API_KEY
        sync: false

      # ── LLM (Groq free tier — background tasks) ──
      - key: GROQ_API_KEY
        sync: false

      # ── Social Sentiment (Reddit PRAW — read-only) ──
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false

      # ── Data Sources ──
      - key: FRED_API_KEY
        sync: false

      # ── Notifications (optional) ──
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      # ── Storage ──
      - key: DATA_DIR
        value: /data

      # ── Paper Trading ──
      - key: PAPER_BALANCE
        value: "1000"
      - key: INITIAL_CAPITAL
        value: "1000"

      # ── Tuning ──
      - key: LEVERAGE_PROFILE
        value: conservative
      - key: DAEMON_INTERVAL_HOURS
        value: "4"

    disk:
      name: agency-data
      mountPath: /data
      sizeGB: 1
